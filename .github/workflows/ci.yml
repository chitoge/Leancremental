name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  proofs-and-tests:
    name: Proofs And Tests
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl git

      - name: Install Lean toolchain
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Build proof surface
        run: lake build Leancremental.Proof

      - name: Build test executable
        run: lake build tests

      - name: Run executable tests
        run: lake exe tests

  docs:
    name: Lean API Docs
    runs-on: ubuntu-latest
    env:
      DOCGEN_SRC: github
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl git

      - name: Install Lean toolchain
        run: |
          curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Resolve Lean API doc dependencies
        run: |
          cd docbuild
          lake update doc-gen4
          lake update leancremental

      - name: Build Lean API docs
        run: |
          cd docbuild
          lake build Leancremental:docs

      - name: Configure GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docbuild/.lake/build/doc

  deploy-docs:
    name: Deploy Lean API Docs
    runs-on: ubuntu-latest
    needs: docs
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    concurrency:
      group: github-pages
      cancel-in-progress: false
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
